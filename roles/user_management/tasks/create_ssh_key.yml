---
# roles/user_management/tasks/create_ssh_key.yml
- name: Create SSH Key for User
  ansible.builtin.user:
    name: "{{ username }}"
    generate_ssh_key: yes
    ssh_key_bits: "{{ ssh_key_bits | default(2048) }}"
    ssh_key_type: "{{ ssh_key_type | default('rsa') }}"
    ssh_key_file: "{{ ssh_key_file | default('.ssh/id_rsa') }}"
    ssh_key_comment: "{{ ssh_key_comment | default('ansible-generated') }}"
    ssh_key_passphrase: "{{ ssh_key_passphrase | default('') }}"
